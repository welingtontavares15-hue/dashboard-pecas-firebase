<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1730">
    <meta name="color-scheme" content="light dark">
    <title>Portal Corporativo de Solicitação de Peças MWW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="css/clean-ui.css?v=20260709c">
    <link rel="stylesheet" href="css/ui-consolidation.css?v=20260713d">
    <link rel="stylesheet" href="css/screen-fixes-v5.css?v=20260713e">
    <link rel="stylesheet" href="css/visual-refresh.css?v=20260716a">
    <link rel="stylesheet" href="css/sidebar-pro.css?v=20260723a">
    <style>
        /* Login simples: somente o cartão de acesso. */
        #login-screen.login-container:not(.hidden) {
            display: grid !important;
            grid-template-columns: minmax(0, 1fr) !important;
            grid-template-rows: minmax(0, 1fr) !important;
            place-items: center !important;
            width: 100% !important;
            height: 100vh !important;
            height: 100svh !important;
            min-height: 100vh !important;
            min-height: 100svh !important;
            padding: 24px !important;
            overflow: auto !important;
            background:
                radial-gradient(circle at 18% 12%, rgba(37, 112, 205, .22), transparent 32%),
                radial-gradient(circle at 84% 88%, rgba(12, 129, 145, .18), transparent 35%),
                linear-gradient(145deg, #07152b 0%, #0b2343 58%, #0f4856 100%) !important;
        }

        #login-screen .login-brand-panel,
        #login-screen .login-mobile-brand,
        #login-screen .login-info-card,
        #login-screen .login-card-footer {
            display: none !important;
        }

        #login-screen .login-card {
            grid-column: 1 !important;
            grid-row: 1 !important;
            display: block !important;
            width: min(100%, 440px) !important;
            min-width: 0 !important;
            min-height: 0 !important;
            height: auto !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: visible !important;
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
        }

        #login-screen .login-card-inner {
            width: 100% !important;
            max-width: none !important;
            margin: 0 !important;
            padding: 38px !important;
            color: #eef5ff !important;
            background: rgba(10, 24, 43, .96) !important;
            border: 1px solid rgba(129, 158, 196, .22) !important;
            border-radius: 18px !important;
            box-shadow: 0 28px 72px rgba(0, 10, 27, .38) !important;
        }

        #login-screen .login-simple-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            margin-bottom: 20px;
            color: #fff;
            background: linear-gradient(145deg, #2479df, #0b55ad);
            border-radius: 13px;
            font-size: 20px;
            font-weight: 800;
            box-shadow: 0 12px 28px rgba(24, 105, 207, .28);
        }

        #login-screen .login-logo {
            margin: 0 0 24px !important;
            text-align: left !important;
        }

        #login-screen .login-logo h1 {
            margin: 4px 0 0 !important;
            color: #f5f9ff !important;
            font-size: 28px !important;
            line-height: 1.15 !important;
            -webkit-text-fill-color: currentColor !important;
        }

        #login-screen .login-form-kicker { color: #62aef7 !important; }
        #login-screen .login-form label { color: #b7c7db !important; }
        #login-screen .login-form .form-control {
            color: #edf5ff !important;
            background: #101f35 !important;
            border-color: #2b405d !important;
        }
        #login-screen .login-form .form-control::placeholder { color: #7f91a9 !important; }
        #login-screen .login-form .form-control:focus {
            background: #12243d !important;
            border-color: #4b9ee9 !important;
            box-shadow: 0 0 0 3px rgba(75, 158, 233, .18) !important;
        }
        #login-screen .toggle-password { color: #a7bad0 !important; }
        #login-screen .credentials-panel { margin-top: 18px !important; }

        @media (max-width: 992px) {
            #login-screen.login-container:not(.hidden) { padding: 18px !important; }
            #login-screen .login-card-inner { padding: 30px 24px !important; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.webmanifest">
    <script src="js/vendor/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="./js/firebase-init.js"></script>
</head>
<body class="light-mode visual-refresh-enabled" data-theme="light">
    <div id="login-screen" class="login-container">
        <main class="login-card" aria-labelledby="login-title">
            <div class="login-card-inner">
                <div class="login-logo">
                    <div class="login-simple-mark" aria-hidden="true">D</div>
                    <span class="login-form-kicker">Portal de Peças MWW</span>
                    <h1 id="login-title">Acesso ao sistema</h1>
                </div>
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="login-username">Usuário</label>
                        <input type="text" id="login-username" class="form-control" placeholder="Digite seu usuário" required autocomplete="username" autocapitalize="none" spellcheck="false">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <div class="password-field">
                            <input type="password" id="login-password" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password">
                            <button type="button" id="toggle-password" class="toggle-password" aria-label="Mostrar senha"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" id="login-submit" class="btn btn-primary btn-block"><i class="fas fa-arrow-right-to-bracket"></i> Entrar</button>
                    <div id="login-status" class="helper-text login-status hidden" aria-live="polite"></div>
                    <div id="login-error" class="error-message hidden" role="alert"></div>
                </form>
                <div id="login-credentials" class="credentials-panel hidden">
                    <div class="credentials-header"><div><h3><i class="fas fa-user-lock"></i> Credenciais disponíveis</h3><p>Use um dos usuários abaixo para acessar.</p></div></div>
                    <div class="credentials-table-wrapper">
                        <table class="credentials-table"><thead><tr><th>Nome</th><th>Usuário</th><th>Perfil</th></tr></thead><tbody id="login-credentials-body"></tbody></table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="app-container" class="app-container hidden">
        <aside id="sidebar" class="sidebar" aria-label="Menu de módulos">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="brand-emblem sidebar-brand" aria-hidden="true"><span>D</span></div>
                    <div class="logo-meta"><span class="logo-title">Diversey</span><small class="logo-subtitle">A Solenis Company</small></div>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-controls="sidebar-nav" aria-expanded="true" aria-label="Recolher menu lateral" title="Recolher menu lateral"><i class="fas fa-bars" aria-hidden="true"></i></button>
            </div>
            <nav id="sidebar-nav" class="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details"><span id="user-name">Usuário</span><span id="user-role" class="user-role">Perfil</span></div>
                </div>
                <div class="sidebar-actions">
                    <button id="theme-toggle" class="btn-icon" title="Alternar tema"><i class="fas fa-moon"></i></button>
                    <button id="logout-btn" class="btn-icon" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <div class="mobile-nav-buttons">
                        <button id="mobile-menu-btn" class="btn-icon" aria-label="Abrir menu"><i class="fas fa-bars"></i></button>
                        <button id="mobile-home-btn" class="btn-icon" aria-label="Voltar para início"><i class="fas fa-home"></i></button>
                    </div>
                    <div class="breadcrumb" id="breadcrumb"><span>Visão Geral</span></div>
                </div>
                <div class="header-actions">
                    <div class="header-search-zone"><div class="global-search"><i class="fas fa-search"></i><input type="text" id="global-search-input" class="form-control" placeholder="Buscar número, cliente, peça ou técnico"></div></div>
                    <div class="header-controls">
                        <button id="sync-btn" class="btn-icon" title="Sincronizar dados"><i class="fas fa-sync-alt"></i></button>
                        <button id="notifications-toggle" class="btn-icon" title="Notificações" aria-label="Abrir notificações"><i class="fas fa-bell"></i><span id="header-notification-dot" class="alert-dot hidden"></span></button>
                        <div class="header-profile"><div class="header-avatar"><i class="fas fa-user"></i></div><div class="header-profile-meta"><span id="header-user-name">Usuário</span><small id="header-user-role">Perfil</small></div></div>
                    </div>
                </div>
            </header>
            <div id="notification-panel" class="notification-panel hidden">
                <div class="notification-panel-header"><h4>Notificações</h4><button id="notification-panel-close" class="btn-icon" aria-label="Fechar notificações"><i class="fas fa-times"></i></button></div>
                <div id="notification-list" class="notification-list"></div>
            </div>
            <div id="content-area" class="content-area"></div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-container" class="modal-container hidden"><div class="modal-backdrop"></div><div id="modal-content" class="modal-content"></div></div>
    <div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div><span>Carregando...</span></div>

    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/utils.js?v=20260709a"></script>
    <script src="js/analytics-engine.js?v=20260315d"></script>
    <script src="js/logger.js"></script>
    <script src="js/indexeddb-storage.js"></script>
    <script src="js/sheets.js"></script>
    <script src="js/onedrive.js"></script>
    <script src="js/storage.js?v=20260316b"></script>
    <script src="js/data.js?v=20260709a"></script>
    <script src="js/auth.js?v=20260316b"></script>
    <script src="js/audit-log.js"></script>
    <script src="js/app.js?v=20260723a"></script>
    <script src="js/ui-modern.js?v=20260723a"></script>
    <script src="js/premium-plus.js?v=20260709b"></script>
    <script src="js/corporate-platform.js?v=20260709b"></script>
</body>
</html>
